name: Publish Public Repo

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-public-${{ github.ref }}
  cancel-in-progress: true

env:
  PRIVATE_REPO: xDuoooo/Intelligent_interview_question_bank_system
  PUBLIC_REPO_URL: https://github.com/xDuoooo/intelliface.git
  PUBLIC_REPO_BRANCH: main

jobs:
  publish:
    if: github.repository == 'xDuoooo/Intelligent_interview_question_bank_system'
    name: Sync Snapshot To Public Repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate publish secret
        env:
          PUBLIC_REPO_PUSH_TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        shell: bash
        run: |
          if [ -z "$PUBLIC_REPO_PUSH_TOKEN" ]; then
            echo "::error::Missing required secret: PUBLIC_REPO_PUSH_TOKEN"
            exit 1
          fi

      - name: Prepare public repo workspace
        env:
          PUBLIC_REPO_BRANCH: ${{ env.PUBLIC_REPO_BRANCH }}
          PUBLIC_REPO_PUSH_TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          public_repo_dir="${RUNNER_TEMP}/public-repo"
          public_repo_url="https://x-access-token:${PUBLIC_REPO_PUSH_TOKEN}@github.com/xDuoooo/intelliface.git"

          echo "PUBLIC_REPO_DIR=${public_repo_dir}" >> "$GITHUB_ENV"

          if git ls-remote --exit-code --heads "${public_repo_url}" "${PUBLIC_REPO_BRANCH}" >/dev/null 2>&1; then
            git clone --branch "${PUBLIC_REPO_BRANCH}" --single-branch "${public_repo_url}" "${public_repo_dir}"
          else
            mkdir -p "${public_repo_dir}"
            git init "${public_repo_dir}"
            git -C "${public_repo_dir}" checkout -b "${PUBLIC_REPO_BRANCH}"
            git -C "${public_repo_dir}" remote add origin "${public_repo_url}"
          fi

      - name: Export snapshot without paper directory
        shell: bash
        run: |
          set -euo pipefail

          find "${PUBLIC_REPO_DIR}" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          git archive --format=tar HEAD -- . ':(top,exclude)paper' ':(top,exclude)paper/**' | tar -xf - -C "${PUBLIC_REPO_DIR}"

      - name: Commit and push public snapshot
        env:
          PUBLIC_REPO_BRANCH: ${{ env.PUBLIC_REPO_BRANCH }}
        shell: bash
        run: |
          set -euo pipefail

          cd "${PUBLIC_REPO_DIR}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "chore: sync snapshot from private repo ${GITHUB_SHA}"
          git push origin "${PUBLIC_REPO_BRANCH}"
