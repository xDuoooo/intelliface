name: Publish Public Repo

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-public-${{ github.ref }}
  cancel-in-progress: true

env:
  PRIVATE_REPO: xDuoooo/Intelligent_interview_question_bank_system
  PUBLIC_REPO_URL: https://github.com/xDuoooo/intelliface.git
  PUBLIC_REPO_BRANCH: main
  EXCLUDE_PATH: paper

jobs:
  publish:
    if: github.repository == 'xDuoooo/Intelligent_interview_question_bank_system'
    name: Sync Filtered History To Public Repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate publish secret
        env:
          PUBLIC_REPO_PUSH_TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        shell: bash
        run: |
          if [ -z "$PUBLIC_REPO_PUSH_TOKEN" ]; then
            echo "::error::Missing required secret: PUBLIC_REPO_PUSH_TOKEN"
            exit 1
          fi

      - name: Rewrite history without paper directory
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
          EXCLUDE_PATH: ${{ env.EXCLUDE_PATH }}
        shell: bash
        run: |
          set -euo pipefail

          git checkout -B "${SOURCE_BRANCH}" "${GITHUB_SHA}"

          export FILTER_BRANCH_SQUELCH_WARNING=1
          git filter-branch --force --prune-empty \
            --index-filter "git rm -r --cached --ignore-unmatch -- ${EXCLUDE_PATH}" \
            -- "${SOURCE_BRANCH}"

      - name: Push filtered history to public repo
        env:
          PUBLIC_REPO_BRANCH: ${{ env.PUBLIC_REPO_BRANCH }}
          PUBLIC_REPO_URL: ${{ env.PUBLIC_REPO_URL }}
          PUBLIC_REPO_PUSH_TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          public_repo_url="https://x-access-token:${PUBLIC_REPO_PUSH_TOKEN}@${PUBLIC_REPO_URL#https://github.com/}"
          remote_ref="refs/heads/${PUBLIC_REPO_BRANCH}"

          git remote add public "${public_repo_url}"

          if git ls-remote --exit-code --heads public "${PUBLIC_REPO_BRANCH}" >/dev/null 2>&1; then
            git fetch --no-tags public "${PUBLIC_REPO_BRANCH}"

            if git merge-base --is-ancestor "refs/remotes/public/${PUBLIC_REPO_BRANCH}" HEAD; then
              git push public "HEAD:${remote_ref}"
            else
              echo "Public history diverged; replacing it with the filtered private history."
              git push --force-with-lease public "HEAD:${remote_ref}"
            fi
          else
            git push public "HEAD:${remote_ref}"
          fi
