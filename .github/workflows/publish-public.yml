name: Publish Public Repo

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-public-${{ github.ref }}
  cancel-in-progress: true

env:
  PRIVATE_REPO: xDuoooo/Intelligent_interview_question_bank_system
  PUBLIC_REPO_URL: https://github.com/xDuoooo/intelliface.git
  PUBLIC_REPO_BRANCH: main

jobs:
  publish:
    if: github.repository == 'xDuoooo/Intelligent_interview_question_bank_system'
    name: Mirror Git History To Public Repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo with full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate publish secret
        env:
          PUBLIC_REPO_PUSH_TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        shell: bash
        run: |
          if [ -z "$PUBLIC_REPO_PUSH_TOKEN" ]; then
            echo "::error::Missing required secret: PUBLIC_REPO_PUSH_TOKEN"
            exit 1
          fi

      - name: Add public remote
        env:
          PUBLIC_REPO_PUSH_TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        shell: bash
        run: |
          git remote remove public 2>/dev/null || true
          git remote add public "https://x-access-token:${PUBLIC_REPO_PUSH_TOKEN}@github.com/xDuoooo/intelliface.git"

      - name: Push branch history to public repo
        env:
          PUBLIC_REPO_BRANCH: ${{ env.PUBLIC_REPO_BRANCH }}
        shell: bash
        run: |
          git push public --force "HEAD:refs/heads/${PUBLIC_REPO_BRANCH}"

      - name: Push tags to public repo
        shell: bash
        run: |
          git push public --force --tags
