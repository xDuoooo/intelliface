services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-intelligent-interview-backend:latest}
    container_name: intelligent-interview-backend
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Dnacos.remote.client.grpc.channel.capability.negotiation.timeout=30000 -Dnacos.remote.client.grpc.timeout=30000 -Dnacos.remote.client.grpc.server.check.timeout=30000 -Dnacos.remote.client.grpc.health.timeout=30000"
      SPRING_PROFILES_ACTIVE: prod
      NACOS_DISCOVERY_SERVER_ADDR: ${NACOS_DISCOVERY_SERVER_ADDR}
      NACOS_DISCOVERY_USERNAME: ${NACOS_DISCOVERY_USERNAME:-}
      NACOS_DISCOVERY_PASSWORD: ${NACOS_DISCOVERY_PASSWORD:-}
      NACOS_CONFIG_SERVER_ADDR: ${NACOS_CONFIG_SERVER_ADDR}
      NACOS_CONFIG_TIMEOUT: ${NACOS_CONFIG_TIMEOUT:-30000}
      NACOS_CONFIG_REFRESH_ENABLED: ${NACOS_CONFIG_REFRESH_ENABLED:-false}
      NACOS_SHARED_CONFIG_REFRESH_ENABLED: ${NACOS_SHARED_CONFIG_REFRESH_ENABLED:-false}
      NACOS_LISTENER_TIMEOUT: ${NACOS_LISTENER_TIMEOUT:-30000}
      NACOS_BLACK_IP_SYNC_ENABLED: ${NACOS_BLACK_IP_SYNC_ENABLED:-false}
      NACOS_BLACK_IP_POLL_FIXED_DELAY_MS: ${NACOS_BLACK_IP_POLL_FIXED_DELAY_MS:-30000}
      NACOS_BLACK_IP_POLL_INITIAL_DELAY_MS: ${NACOS_BLACK_IP_POLL_INITIAL_DELAY_MS:-30000}
      NACOS_CONFIG_USERNAME: ${NACOS_CONFIG_USERNAME:-}
      NACOS_CONFIG_PASSWORD: ${NACOS_CONFIG_PASSWORD:-}
      SENTINEL_DASHBOARD: ${SENTINEL_DASHBOARD:-}
    volumes:
      - uploads-data:/app/uploads
    expose:
      - "8101"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://backend:8101
    image: ${FRONTEND_IMAGE:-intelligent-interview-frontend:latest}
    container_name: intelligent-interview-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8101
      NEXT_PUBLIC_API_BASE_URL: ""
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: intelligent-interview-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${NGINX_CERTS_DIR:-/opt/intelliface/certs}:/etc/nginx/certs:ro

volumes:
  uploads-data:
