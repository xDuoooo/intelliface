# application-local.yml 模板文件
# 使用方式：
# 1. 复制一份为 application-local.yml
# 2. 将数据库、Redis、ES、OAuth 等值改成你本机实际配置
# 3. application-local.yml 已在 .gitignore 中，不会被误提交
# 4. local 即开发环境
# 5. 如果你准备让本地也完全走 Nacos，建议只保留 Nacos 连接配置，其余值改放 docs/nacos/*.example.yml 对应的远程配置里

# 本地服务启动地址
server:
  address: 0.0.0.0
  port: ${SERVER_PORT:8101}
  servlet:
    session:
      cookie:
        max-age: 2592000

spring:
  # 本地开发开启热重启
  devtools:
    restart:
      enabled: true
  session:
    timeout: 2592000
  lettuce:
    pool:
      max-active: 200
      max-wait: -1ms
      max-idle: 10
      min-idle: 0
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 16MB
  # 本地数据库连接
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/intelligent_interview_question_bank_system?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: root
    password: your_db_password
  # 本地 Redis 连接
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
      username: ""
      timeout: 5000
      password: your_redis_password
  # 本地 Elasticsearch 连接
  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: your_es_password
  # Spring Cloud 本地联调配置
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: 127.0.0.1:8848
        username: ""
        password: ""
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
        username: ""
        password: ""
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            refresh: true
    sentinel:
      enabled: false
      transport:
        dashboard: localhost:8138
  # 通过 Spring Config 导入 Nacos 远程配置
  config:
    import:
      - optional:nacos:Intelligent-interview-question-bank-system.yml

# 本地开发建议开启 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 本地黑名单配置来源
nacos:
  config:
    sync-enabled: false
    data-id: black-ip-list.yml
    group: DEFAULT_GROUP

# 腾讯云 COS 配置
cos:
  client:
    accessKey: your_cos_access_key
    secretKey: your_cos_secret_key
    region: ap-beijing
    bucket: your_cos_bucket

# 本地保留接口文档
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.xduo.springbootinit.controller

sa-token:
  token-name: zhimian
  timeout: 2592000
  active-timeout: -1
  is-concurrent: false
  is-share: true
  token-style: uuid
  is-log: true

# 阿里云号码验证服务短信配置
# 说明：
# 1. SignName / TemplateCode 请填写号码验证服务可用的签名和模板
# 2. TemplateParam 会由代码自动组装为 {"code":"##code##","min":"5"} 这种格式
# 3. 只有当 code 使用 ##code## 占位时，后续 CheckSmsVerifyCode 才能由阿里云完成核验
tencent:
  email:
    secretId: your_tencent_email_secret_id
    secretKey: your_tencent_email_secret_key
    region: ap-guangzhou
    fromEmailAddress: notice@example.com
    replyToAddresses: ""
    verificationTemplateId: your_tencent_email_verification_template_id
    learningReminderTemplateId: ""

aliyun:
  sms:
    accessKeyId: your_aliyun_access_key_id
    accessKeySecret: your_aliyun_access_key_secret
    endpoint: dypnsapi.aliyuncs.com
    signName: 阿里云赠送签名
    templateCode: SMS_123456789
    schemeName: ""
    countryCode: 86
    codeLength: 6
    validTimeSeconds: 300
    intervalSeconds: 60
    codeType: 1
    duplicatePolicy: 1
    caseAuthPolicy: 1
    codeParamName: code
    validTimeParamName: min
    codePlaceholder: "##code##"

# 第三方登录本地配置
social:
  github:
    id: your_github_client_id
    secret: your_github_client_secret
    redirect-uri: http://localhost:8101/api/user/login/github/callback
  gitee:
    id: your_gitee_client_id
    secret: your_gitee_client_secret
    redirect-uri: http://localhost:8101/api/user/login/gitee/callback
  google:
    id: your_google_client_id
    secret: your_google_client_secret
    redirect-uri: http://localhost:8101/api/user/login/google/callback
    request-timeout-ms: 10000

# 微信公众号验证码登录（个人订阅号免费方案）
# 公众号后台 -> 基本配置 -> 服务器配置：
# 1. URL 填你的后端公网地址 + /api/
# 2. Token 与下方保持一致
# 3. 消息加解密方式请选择“明文模式”
wechat:
  mp:
    enabled: false
    token: your_wechat_mp_token
    accountName: 你的公众号名称
    qrImageUrl: https://your-domain.com/static/wechat-mp-qr.png
    loginKeyword: 登录
    ticketExpireSeconds: 600
    codeExpireSeconds: 300

# AI 模型本地配置
ai:
  chat:
    # 文本 AI：DeepSeek / 火山方舟等 OpenAI 兼容接口均可
    api-key: your_deepseek_api_key
    host: https://api.deepseek.com
    model: deepseek-v4-flash
  speech:
    # 语音转写：openai / openai-compatible / volcengine / doubao
    provider: volcengine
    # 火山引擎豆包语音控制台中的 X-Api-Key
    api-key: your_volcengine_speech_api_key
    endpoint: https://openspeech.bytedance.com/api/v3/auc/bigmodel/recognize/flash
    resource-id: volc.bigasr.auc_turbo
    model-name: bigmodel
    user-id: intelliface
    timeout-seconds: 120
  rate-limit:
    enabled: true
    chat:
      max-per-minute: 10
      max-per-day: 100
    audio:
      max-per-minute: 3
      max-per-day: 30

# 前端联调地址
app:
  frontend-url: http://localhost:3000
  elasticsearch:
    # ES 不可用时快速降级到数据库，避免搜索接口卡 30 秒
    connect-timeout-ms: 1000
    socket-timeout-ms: 3000
    connection-request-timeout-ms: 1000
  email:
    # 本地开发建议默认开启模拟发信，避免误发真实邮件
    mock-enabled: true
  cors:
    # 多个来源可用英文逗号分隔；本地如只跑一个前端端口，可直接复用 frontend-url
    allowed-origin-patterns: http://localhost:3000,http://127.0.0.1:3000
  sms:
    # 本地允许短信模拟发送，便于联调验证码流程
    mock-enabled: true
  ip-location:
    # 本地调试“按 IP 自动识别城市”时，可临时指定一个模拟城市（需是系统支持的城市）
    dev-city: 杭州
    ip2region:
      # 是否启用 ip2region xdb 离线库查询；会优先于在线接口
      enabled: true
      # 默认读取项目内置 IPv4 离线库，也可改成 file:/app/data/ip2region_v4.xdb
      v4-xdb-location: classpath:ip2region/ip2region_v4.xdb
      # 如需要 IPv6，可额外放置 v6 xdb 后配置该路径
      v6-xdb-location: ""
      searchers: 20
    # 是否在未命中 CDN / 网关城市请求头和 ip2region 离线库时，再按公网 IP 调第三方接口查询城市
    lookup-enabled: false
    # {ip} 会自动替换为客户端公网 IP；如后续你切换为自建服务或别的供应商，只改这里即可
    lookup-url-template: https://whois.pconline.com.cn/ipJson.jsp?json=true&ip={ip}
    # 第三方 IP 城市查询超时时间（毫秒）
    lookup-timeout-ms: 1500
  upload:
    # 本地允许在未配置 COS 时回退到项目根目录 uploads/
    local-fallback-enabled: true
    local-dir: ${user.dir}/uploads
  es-sync:
    compensation:
      # 建议保持开启；这样写 MySQL 成功但写 ES 失败时，会落补偿任务并自动重试
      enabled: true
      fixed-rate-ms: 60000
      batch-size: 200
    question:
      # 建议默认关闭；若想让题目 ES 同步有定时兜底，可改为 true
      incremental-enabled: false
      full-sync-on-start: false
      incremental-fixed-rate-ms: 60000
      incremental-lookback-minutes: 5
    post:
      # 建议默认关闭；若想让帖子 ES 同步有定时兜底，可改为 true
      incremental-enabled: false
      full-sync-on-start: false
      incremental-fixed-rate-ms: 60000
      incremental-lookback-minutes: 5
    tag:
      # 标签索引推荐保持开启；启动时会全量重建一次 tag 索引，后续再按题目 / 帖子 / 兴趣标签变更增量维护
      full-sync-on-start: true
