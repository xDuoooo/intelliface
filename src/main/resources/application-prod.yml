# 生产环境配置文件
# 说明：
# 1. 这里只保留生产环境启动和连接 Nacos 所需的最小配置
# 2. 数据库、Redis、ES、COS、短信、邮件、OAuth、AI、前端域名等统一放到 Nacos

# 生产环境服务地址
server:
  address: 0.0.0.0
  port: 8101
spring:
  # 生产环境关闭热重启
  devtools:
    restart:
      enabled: false
  # 生产环境 Spring Cloud 配置
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_DISCOVERY_SERVER_ADDR:}
        username: ${NACOS_DISCOVERY_USERNAME:}
        password: ${NACOS_DISCOVERY_PASSWORD:}
      config:
        enabled: true
        server-addr: ${NACOS_CONFIG_SERVER_ADDR:}
        username: ${NACOS_CONFIG_USERNAME:}
        password: ${NACOS_CONFIG_PASSWORD:}
        timeout: ${NACOS_CONFIG_TIMEOUT:30000}
        refresh-enabled: ${NACOS_CONFIG_REFRESH_ENABLED:false}
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            refresh: ${NACOS_SHARED_CONFIG_REFRESH_ENABLED:false}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:}
  # 生产环境远程配置导入
  config:
    import:
      - optional:nacos:Intelligent-interview-question-bank-system.yml

# 生产环境 SQL 日志策略
mybatis-plus:
  configuration:
    # 生产环境关闭日志
    log-impl: ''
