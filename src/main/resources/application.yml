# 公共配置文件
# 说明：
# 1. 这里只放所有环境都通用的基础配置
# 2. 不要在这里放数据库、Redis、ES、邮件、第三方登录回调等强环境相关信息
# 3. 环境相关配置分别放到 application-local.yml / application-test.yml / application-prod.yml
# 4. 业务开关、连接信息、第三方密钥、前端域名等优先放到 Nacos

spring:
  # 应用基础信息
  application:
    name: Intelligent-interview-question-bank-system
  # 默认使用 local 环境，可通过 SPRING_PROFILES_ACTIVE 覆盖
  profiles:
    default: local
  # 兼容 Swagger / Knife4j 在 Spring Boot 3 下的路径匹配
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# Nacos 黑名单同步器自定义配置
nacos:
  config:
    # 是否启用自定义黑名单配置同步。默认关闭，按需开启后会使用定时拉取而不是长连接监听。
    sync-enabled: ${NACOS_BLACK_IP_SYNC_ENABLED:false}
    # 远程黑名单配置文件名
    data-id: black-ip-list.yml
    # 所属分组
    group: DEFAULT_GROUP
    # 获取远程配置的超时时间，单位毫秒
    timeout: ${NACOS_LISTENER_TIMEOUT:30000}
    # 定时拉取间隔，单位毫秒
    poll-fixed-delay-ms: ${NACOS_BLACK_IP_POLL_FIXED_DELAY_MS:30000}
    # 启动后首次拉取延迟，单位毫秒
    poll-initial-delay-ms: ${NACOS_BLACK_IP_POLL_INITIAL_DELAY_MS:30000}

# Web 服务基础配置
server:
  # 让 Spring 在 Nginx / 反向代理后正确识别原始协议、域名和端口，避免把 https 外部请求误判成内部 http 跨域请求
  forward-headers-strategy: framework
  servlet:
    # 所有后端接口统一以 /api 开头
    context-path: /api

# MyBatis Plus 全局行为
mybatis-plus:
  configuration:
    # false 表示严格按数据库字段名映射，不自动转驼峰
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
